<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confetti!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --text: #f0ece0;
    --muted: #666;
    --accent: #e8c96a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .stage {
    text-align: center;
    z-index: 20;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .headline span {
    color: var(--accent);
  }

  .sub {
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .btn-wrap {
    position: relative;
  }

  button {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    letter-spacing: 0.04em;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 0;
    padding: 1.1rem 3rem;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
    outline-offset: 4px;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--accent);
    transform: translate(6px, 6px);
    transition: transform 0.15s ease;
    pointer-events: none;
  }

  button:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--muted);
  }

  button:hover::after {
    transform: translate(8px, 8px);
  }

  button:active {
    transform: translate(0, 0);
    box-shadow: none;
  }

  button:active::after {
    transform: translate(4px, 4px);
  }

  button:focus-visible {
    outline: 2px solid var(--accent);
  }

  .counter {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-height: 1.2em;
    transition: opacity 0.3s;
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
    button::after { transition: none; }
  }
</style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<canvas id="c" aria-hidden="true"></canvas>

<main class="stage">
  <div>
    <h1 class="headline">Press for<br><span>confetti.</span></h1>
  </div>
  <p class="sub">Go on, you deserve it</p>
  <div class="btn-wrap">
    <button id="btn" aria-label="Launch confetti" aria-live="polite">
      🎉 &nbsp;Celebrate
    </button>
  </div>
  <p class="counter" id="counter" aria-live="polite"></p>
</main>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const btn = document.getElementById('btn');
  const counter = document.getElementById('counter');

  let W, H;
  const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    '#e8c96a', '#f2a65a', '#e85d75', '#c45cc4',
    '#5b9cf6', '#4ecdc4', '#f7f7f2', '#a8e6b5'
  ];

  const SHAPES = ['rect', 'circle', 'ribbon'];

  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 14;
      this.vy = Math.random() * -18 - 6;
      this.gravity = 0.55;
      this.drag = 0.98;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      this.size = Math.random() * 8 + 5;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.25;
      this.opacity = 1;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.08 + 0.04;
      this.scaleX = 1;
    }

    update() {
      this.wobble += this.wobbleSpeed;
      this.scaleX = Math.cos(this.wobble);
      this.vx *= this.drag;
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.rotation += this.rotationSpeed;
      if (this.y > H - 50) this.opacity -= 0.045;
      else if (this.opacity < 1) this.opacity = Math.min(1, this.opacity + 0.05);
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.opacity);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.scale(this.scaleX, 1);
      ctx.fillStyle = this.color;

      if (this.shape === 'rect') {
        const w = this.size * 1.6, h = this.size * 0.7;
        ctx.fillRect(-w / 2, -h / 2, w, h);
      } else if (this.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, this.size * 0.55, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -this.size);
        ctx.bezierCurveTo(this.size * 0.8, -this.size * 0.5, this.size * 0.8, this.size * 0.5, 0, this.size);
        ctx.bezierCurveTo(-this.size * 0.8, this.size * 0.5, -this.size * 0.8, -this.size * 0.5, 0, -this.size);
        ctx.fill();
      }

      ctx.restore();
    }

    get dead() { return this.opacity <= 0 || this.y > H + 60; }
  }

  let particles = [];
  let frameId = null;
  let pressCount = 0;

  function burst(x, y, count) {
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y));
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles = particles.filter(p => !p.dead);
    particles.forEach(p => { p.update(); p.draw(); });
    if (particles.length > 0) frameId = requestAnimationFrame(loop);
    else frameId = null;
  }

  const labels = [
    '', 'Nice!', 'Again!', 'Whee!', 'More!',
    'Keep going!', 'Party time!', 'Unstoppable!',
    'Legend!', 'Confetti master!', '🏆 Maximum celebrate!'
  ];

  btn.addEventListener('click', (e) => {
    pressCount++;
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    burst(cx, cy, 80);

    if (Math.random() > 0.4) {
      setTimeout(() => burst(cx + (Math.random() - 0.5) * 120, cy - 60, 30), 120);
      setTimeout(() => burst(cx + (Math.random() - 0.5) * 120, cy - 60, 25), 240);
    }

    const idx = Math.min(pressCount, labels.length - 1);
    counter.textContent = idx > 0 ? labels[idx] : '';

    if (!frameId) frameId = requestAnimationFrame(loop);
  });

  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      btn.click();
    }
  });
</script>
</body>
</html>
