<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --card:      #1a1a26;
    --border:    #2a2a3a;
    --border2:   #3a3a50;
    --accent:    #00539B;
    --accent2:   #00a8ff;
    --text:      #e8e8f0;
    --muted:     #7070a0;
    --muted2:    #4a4a6a;
    --white:     #ffffff;
    --radius:    12px;
    --radius-lg: 20px;
    --mono:      'DM Mono', monospace;
    --display:   'Syne', sans-serif;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,83,155,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,83,155,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,83,155,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    gap: 16px;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--white) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    font-weight: 400;
    font-style: italic;
    -webkit-text-fill-color: var(--muted);
    background: none;
  }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 5px 14px;
    white-space: nowrap;
  }

  /* ── Main grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
  }

  .card + .card { margin-top: 16px; }

  .card-label {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  /* ── Input / Textarea ── */
  textarea, input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    line-height: 1.6;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,83,155,0.2);
  }

  textarea { min-height: 100px; }

  /* ── Char counter ── */
  .input-meta {
    display: flex;
    justify-content: flex-end;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted2);
    font-family: var(--mono);
  }

  /* ── Row layout inside cards ── */
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > * { flex: 1 1 120px; }

  /* ── Field groups ── */
  .field { display: flex; flex-direction: column; gap: 6px; }

  .field-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--display);
    font-weight: 600;
  }

  /* ── Color picker row ── */
  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    transition: border-color var(--transition);
    cursor: pointer;
  }

  .color-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,83,155,0.2);
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
  }

  input[type="color"] {
    width: 100%;
    height: 100%;
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    opacity: 0;
    position: absolute;
    inset: 0;
  }

  .color-swatch { position: relative; }

  .color-preview {
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .color-hex {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    flex: 1;
    background: none;
    border: none;
    outline: none;
    padding: 0;
    width: 80px;
  }

  /* ── Range slider ── */
  .range-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .range-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid var(--card);
    box-shadow: 0 0 0 1px var(--accent2);
    cursor: pointer;
    transition: transform var(--transition);
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  /* ── EC level buttons ── */
  .ec-group {
    display: flex;
    gap: 8px;
  }

  .ec-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 4px;
    cursor: pointer;
    transition: all var(--transition);
    text-align: center;
    line-height: 1.3;
  }

  .ec-btn:hover { border-color: var(--border2); color: var(--text); }

  .ec-btn.active {
    background: rgba(0,83,155,0.2);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .ec-btn .level { font-weight: 500; font-size: 14px; display: block; }
  .ec-btn .pct   { font-size: 10px; opacity: 0.7; }

  /* ── Logo overlay toggle ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .toggle-info { font-size: 13px; color: var(--muted); }
  .toggle-info strong { color: var(--text); display: block; font-weight: 400; }

  .toggle {
    position: relative;
    width: 44px; height: 24px;
    flex-shrink: 0;
  }

  .toggle input { display: none; }

  .toggle-track {
    display: block;
    width: 100%; height: 100%;
    background: var(--border2);
    border-radius: 100px;
    cursor: pointer;
    transition: background var(--transition);
  }

  .toggle input:checked + .toggle-track { background: var(--accent); }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--white);
    transition: transform var(--transition);
  }

  .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

  /* ── Logo type select ── */
  .logo-select-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, opacity 0.3s;
    opacity: 0;
  }

  .logo-select-wrap.open {
    max-height: 200px;
    opacity: 1;
  }

  .logo-select-inner { padding-top: 14px; }

  .logo-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .logo-opt {
    flex: 1;
    min-width: 60px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 6px;
    cursor: pointer;
    transition: all var(--transition);
    text-align: center;
  }

  .logo-opt:hover { border-color: var(--border2); color: var(--text); }

  .logo-opt.active {
    background: rgba(0,83,155,0.2);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ── Preview panel ── */
  .preview-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: sticky;
    top: 24px;
  }

  .preview-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .preview-title {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  .preview-body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    min-height: 300px;
  }

  #qr-canvas {
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,83,155,0.25), 0 0 0 1px var(--border);
    display: block;
    max-width: 100%;
    height: auto;
  }

  .preview-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Download buttons ── */
  .dl-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 16px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all var(--transition);
    text-decoration: none;
    font-weight: 500;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--white);
  }

  .btn-primary:hover {
    background: var(--accent2);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,168,255,0.3);
  }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-secondary:hover {
    border-color: var(--border2);
    color: var(--text);
    transform: translateY(-1px);
  }

  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── QR info strip ── */
  .qr-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted2);
    font-family: var(--mono);
    padding-top: 4px;
  }

  /* ── Error message ── */
  .error-msg {
    display: none;
    font-size: 12px;
    color: #ff6b6b;
    font-family: var(--mono);
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(255,107,107,0.1);
    border-radius: 6px;
    border: 1px solid rgba(255,107,107,0.2);
  }

  /* ── Utility ── */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .value-display {
    font-size: 12px;
    color: var(--accent2);
    font-family: var(--mono);
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 20px 0 28px; margin-bottom: 32px; }
    .card { padding: 20px; }
    .ec-btn .pct { display: none; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <h1 class="logo">QR<span>studio</span></h1>
    <span class="badge">All local · No server</span>
  </header>

  <div class="main-grid">

    <!-- ── Left column: controls ── -->
    <div class="controls-col">

      <!-- Content -->
      <div class="card">
        <div class="card-label">Content</div>
        <textarea id="qr-input" placeholder="https://example.com — or any text, phone number, email…" aria-label="QR code content" maxlength="2048">https://example.com</textarea>
        <div class="input-meta">
          <span id="char-count">19 / 2048</span>
        </div>
        <div id="error-msg" class="error-msg" role="alert"></div>
      </div>

      <!-- Colors -->
      <div class="card">
        <div class="card-label">Colors</div>
        <div class="row">
          <div class="field">
            <label class="field-label" for="fg-hidden">Foreground</label>
            <div class="color-row" role="group" aria-label="Foreground color">
              <div class="color-swatch">
                <div class="color-preview" id="fg-preview" style="background:#00539B;"></div>
                <input type="color" id="fg-hidden" value="#00539B" aria-label="Pick foreground color" tabindex="-1">
              </div>
              <input class="color-hex" id="fg-hex" type="text" value="#00539B" maxlength="7" aria-label="Foreground hex value" spellcheck="false">
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="bg-hidden">Background</label>
            <div class="color-row" role="group" aria-label="Background color">
              <div class="color-swatch">
                <div class="color-preview" id="bg-preview" style="background:#ffffff;"></div>
                <input type="color" id="bg-hidden" value="#ffffff" aria-label="Pick background color" tabindex="-1">
              </div>
              <input class="color-hex" id="bg-hex" type="text" value="#ffffff" maxlength="7" aria-label="Background hex value" spellcheck="false">
            </div>
          </div>
        </div>
      </div>

      <!-- Size + EC -->
      <div class="card">
        <div class="card-label">Size & Correction</div>

        <div class="range-wrap" style="margin-bottom:20px;">
          <div class="range-header">
            <span class="field-label">Output size</span>
            <span class="value-display"><span id="size-val">512</span> px</span>
          </div>
          <input type="range" id="qr-size" min="128" max="1024" step="64" value="512" aria-label="QR code size in pixels">
        </div>

        <div class="field">
          <div class="range-header" style="margin-bottom:8px;">
            <span class="field-label">Error correction</span>
          </div>
          <div class="ec-group" role="group" aria-label="Error correction level">
            <button class="ec-btn" data-ec="L" aria-pressed="false">
              <span class="level">L</span>
              <span class="pct">7%</span>
            </button>
            <button class="ec-btn" data-ec="M" aria-pressed="false">
              <span class="level">M</span>
              <span class="pct">15%</span>
            </button>
            <button class="ec-btn" data-ec="Q" aria-pressed="false">
              <span class="level">Q</span>
              <span class="pct">25%</span>
            </button>
            <button class="ec-btn active" data-ec="H" aria-pressed="true">
              <span class="level">H</span>
              <span class="pct">30%</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Logo overlay -->
      <div class="card">
        <div class="card-label">Logo overlay</div>

        <div class="toggle-row">
          <div class="toggle-info">
            <strong>Embed a logo in the center</strong>
            <span>Uses high error correction for best scan reliability</span>
          </div>
          <label class="toggle" aria-label="Enable logo overlay">
            <input type="checkbox" id="logo-toggle">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="logo-select-wrap" id="logo-wrap">
          <div class="logo-select-inner">
            <div class="divider"></div>
            <div style="margin-top:14px;">
              <span class="field-label" style="display:block;margin-bottom:8px;">Choose logo</span>
              <div class="logo-options" role="group" aria-label="Logo selection">
                <button class="logo-opt active" data-logo="apple" aria-pressed="true">Apple</button>
                <button class="logo-opt" data-logo="github" aria-pressed="false">GitHub</button>
                <button class="logo-opt" data-logo="wifi" aria-pressed="false">Wi-Fi</button>
                <button class="logo-opt" data-logo="heart" aria-pressed="false">Heart</button>
                <button class="logo-opt" data-logo="star" aria-pressed="false">Star</button>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

    <!-- ── Right column: preview ── -->
    <div class="preview-col">
      <div class="preview-panel">
        <div class="preview-header">
          <span class="preview-title">Preview</span>
          <div class="status-dot" aria-hidden="true"></div>
        </div>
        <div class="preview-body">
          <canvas id="qr-canvas" aria-label="Generated QR code"></canvas>
        </div>
        <div class="preview-footer">
          <div class="dl-row">
            <button class="btn btn-primary" id="dl-png" aria-label="Download QR code as PNG">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              PNG
            </button>
            <button class="btn btn-secondary" id="dl-svg" aria-label="Download QR code as SVG">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              SVG
            </button>
          </div>
          <div class="qr-info">
            <span>Size: <span id="info-size">512×512</span></span>
            <span>EC: <span id="info-ec">H</span></span>
            <span id="info-chars">19 chars</span>
          </div>
        </div>
      </div>
    </div>

  </div><!-- end main-grid -->

</div><!-- end wrapper -->

<script>
// ─────────────────────────────────────────────────
// CONFIG — editable content at the top
// ─────────────────────────────────────────────────
const CONFIG = {
  defaultText:    'https://example.com',
  defaultFg:      '#00539B',
  defaultBg:      '#ffffff',
  defaultSize:    512,
  defaultEC:      'H',
  defaultLogo:    false,
  defaultLogoType:'apple',
  maxLength:      2048,
};

// SVG paths for logo overlays (viewBox 0 0 100 100 unless noted)
const LOGOS = {
  apple: {
    // Apple  — viewBox 0 0 814 1000
    vw: 814, vh: 1000,
    path: 'M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46.7 790 0 665.1 0 546.8c0-206.7 134.4-315.9 266.1-315.9 79 0 144.5 44.2 192.6 44.2 46.5 0 119.7-46.8 211.3-46.8 33.5.1 107.1 3.4 167.1 67.6zm-186.9-117.1c31.4-37.9 53.6-90.8 53.6-143.7 0-7.5-.6-15-1.9-22.5-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 137.2 0 8.2 1.4 16.4 2.1 18.8 3.2.5 8.4 1.2 13.7 1.2 45.3.1 102.1-30.2 134.7-66.8z',
    offsetY: -80,
  },
  github: {
    vw: 496, vh: 512,

      'M8.53 16.11a6 6 0 0 1 6.95 0',
    ],
    circle: { cx: 12, cy: 20, r: 1 },
    offsetY: 0,
  },
  heart: {
    vw: 24, vh: 24,
    heartPath: 'M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z',
    offsetY: 0,
  },
  star: {
    vw: 24, vh: 24,
    starPath: 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',

// ─────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────
let state = {
  text:     CONFIG.defaultText,
  fg:       CONFIG.defaultFg,
  bg:       CONFIG.defaultBg,
  size:     CONFIG.defaultSize,
  ec:       CONFIG.defaultEC,
  logo:     CONFIG.defaultLogo,
  logoType: CONFIG.defaultLogoType,
};

// ─────────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────────
const qrInput    = document.getElementById('qr-input');
const charCount  = document.getElementById('char-count');
const fgHidden   = document.getElementById('fg-hidden');
const bgHidden   = document.getElementById('bg-hidden');
const fgHexIn    = document.getElementById('fg-hex');
const bgHexIn    = document.getElementById('bg-hex');
const fgPreview  = document.getElementById('fg-preview');
const bgPreview  = document.getElementById('bg-preview');
const sizeSlider = document.getElementById('qr-size');
const sizeVal    = document.getElementById('size-val');
const ecBtns     = document.querySelectorAll('.ec-btn');
const logoToggle = document.getElementById('logo-toggle');
const logoWrap   = document.getElementById('logo-wrap');
const logoOpts   = document.querySelectorAll('.logo-opt');
const canvas     = document.getElementById('qr-canvas');
const dlPng      = document.getElementById('dl-png');
const dlSvg      = document.getElementById('dl-svg');
const errorMsg   = document.getElementById('error-msg');
const infoSize   = document.getElementById('info-size');
const infoEc     = document.getElementById('info-ec');
const infoChars  = document.getElementById('info-chars');

// ─────────────────────────────────────────────────
// QR Generation
// ─────────────────────────────────────────────────
let debounce;

function generate() {
  const text = state.text.trim() || ' ';
  const size  = state.size;
  const fg    = state.fg;
  const bg    = state.bg;

  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);

  errorMsg.style.display = 'none';

  const ecMap = {L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H};

  const tmp = document.createElement('div');
  try {
    new QRCode(tmp, {
      text, width: size, height: size,
      colorDark: fg, colorLight: bg,
      correctLevel: ecMap[state.ec],
    });
  } catch(e) {
    errorMsg.textContent = 'Content is too long or cannot be encoded. Please shorten the text.';
    errorMsg.style.display = 'block';
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);
    return;
  }

  const finish = (source) => {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(source, 0, 0, size, size);
    if (state.logo) overlayLogo(ctx, size, fg, bg);
  };

  const img = tmp.querySelector('img');
  if (img) {
    if (img.complete) { finish(img); }
    else { img.onload = () => finish(img); }
  } else {
    const inner = tmp.querySelector('canvas');
    if (inner) finish(inner);
  }

  // Update info
  infoSize.textContent  = `${size}×${size}`;
  infoEc.textContent    = state.ec;
  infoChars.textContent = `${state.text.length} chars`;
}

function scheduleGenerate() {
  clearTimeout(debounce);
  debounce = setTimeout(generate, 180);
}

// ─────────────────────────────────────────────────
// Logo overlay
// ─────────────────────────────────────────────────
function overlayLogo(ctx, size, fg, bg) {
  const logo = LOGOS[state.logoType];
  if (!logo) return;

  const logoSize  = size * 0.20;
  const pad       = logoSize * 0.28;
  const r         = logoSize / 2 + pad;
  const cx        = size / 2;
  const cy        = size / 2;

  // White circle background
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();
  // Subtle ring
  ctx.strokeStyle = fg;
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  ctx.save();

  if (logo.d) {
    // Wi-Fi (stroke-based)
    const scale = logoSize / logo.vw;
    ctx.translate(cx - (logo.vw * scale) / 2, cy - (logo.vh * scale) / 2);
    ctx.scale(scale, scale);
    ctx.strokeStyle = fg;
    ctx.lineWidth = 2 / scale;
    ctx.lineCap = 'round';

    logo.strokes.forEach(d => {
      ctx.beginPath();
      parseSvgPath(ctx, d);
      ctx.stroke();
    });

    if (logo.circle) {
      const c = logo.circle;
      ctx.beginPath();
      ctx.arc(c.cx, c.cy, c.r, 0, Math.PI * 2);
      ctx.fillStyle = fg;
      ctx.fill();
    }

  } else if (logo.heartPath) {
    const scale = logoSize / logo.vw;
    ctx.translate(cx - (logo.vw * scale) / 2, cy - (logo.vh * scale) / 2);
    ctx.scale(scale, scale);
    const p = new Path2D(logo.heartPath);
    ctx.fillStyle = fg;
    ctx.fill(p);

  } else if (logo.starPath) {
    const scale = logoSize / logo.vw;
    ctx.translate(cx - (logo.vw * scale) / 2, cy - (logo.vh * scale) / 2);
    ctx.scale(scale, scale);
    const p = new Path2D(logo.starPath);
    ctx.fillStyle = fg;
    ctx.fill(p);

  } else {
    // Apple / GitHub (filled path)
    const scale = logoSize / logo.vw;
    const drawH = logo.vh * scale;
    const drawW = logo.vw * scale;
    ctx.translate(cx - drawW / 2, cy - drawH / 2 + (logo.offsetY || 0) * scale);
    ctx.scale(scale, scale);
    const p = new Path2D(logo.path);
    ctx.fillStyle = fg;
    ctx.fill(p);
  }

  ctx.restore();
}

// Minimal SVG arc path parser for Wi-Fi paths
function parseSvgPath(ctx, d) {
  const cmds = d.match(/[MLAZmlaz][^MLAZmlaz]*/g) || [];
  cmds.forEach(cmd => {
    const type = cmd[0];
    const args = cmd.slice(1).trim().split(/[\s,]+/).map(Number);
    if (type === 'M') ctx.moveTo(args[0], args[1]);
    else if (type === 'L') ctx.lineTo(args[0], args[1]);
    else if (type === 'A') {
      const [rx, ry, rot, laf, sf, x, y] = args;
      svgArcToBezier(ctx, rx, ry, rot, laf, sf, x, y);
    }
  });
}

function svgArcToBezier(ctx, rx, ry, xRot, largeArc, sweep, ex, ey) {
  // Approximate arc with bezier; simplified for circular arcs
  ctx.arcTo(0, 0, ex, ey, Math.min(rx, ry));
}

// ─────────────────────────────────────────────────
// Color helpers
// ─────────────────────────────────────────────────
function isValidHex(h) { return /^#[0-9a-fA-F]{6}$/.test(h); }

function syncColor(which, val) {
  if (which === 'fg') {
    fgHidden.value   = val;
    fgHexIn.value    = val;
    fgPreview.style.background = val;
    state.fg         = val;
  } else {
    bgHidden.value   = val;
    bgHexIn.value    = val;
    bgPreview.style.background = val;
    state.bg         = val;
  }
  scheduleGenerate();
}

// ─────────────────────────────────────────────────
// SVG export
// ─────────────────────────────────────────────────
function downloadSVG() {
  const size = state.size;
  const fg   = state.fg;
  const bg   = state.bg;
  const text = state.text.trim() || ' ';
  const ecMap = {L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H};

  // Render to an offscreen canvas at 512px, then embed as image in SVG
  const off = document.createElement('canvas');
  off.width = off.height = 512;
  const oct = off.getContext('2d');
  const tmp = document.createElement('div');
  try {
    new QRCode(tmp, { text, width: 512, height: 512, colorDark: fg, colorLight: bg, correctLevel: ecMap[state.ec] });
  } catch(e) { return; }

  const finish = (src) => {
    oct.clearRect(0,0,512,512);
    oct.drawImage(src, 0,0,512,512);
    if (state.logo) overlayLogo(oct, 512, fg, bg);
    const dataURL = off.toDataURL('image/png');
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <rect width="${size}" height="${size}" fill="${bg}"/>
  <image href="${dataURL}" width="${size}" height="${size}"/>
</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'qrcode.svg'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const img = tmp.querySelector('img');
  if (img) { if (img.complete) finish(img); else img.onload = () => finish(img); }
  else { const c = tmp.querySelector('canvas'); if (c) finish(c); }
}

// ─────────────────────────────────────────────────
// Event listeners
// ─────────────────────────────────────────────────

// Text input
qrInput.addEventListener('input', () => {
  state.text = qrInput.value;
  charCount.textContent = `${state.text.length} / ${CONFIG.maxLength}`;
  scheduleGenerate();
});

// Color pickers
fgHidden.addEventListener('input', () => syncColor('fg', fgHidden.value));
bgHidden.addEventListener('input', () => syncColor('bg', bgHidden.value));

// Swatches open native picker
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => sw.querySelector('input[type=color]').click());
});

// Hex text inputs
fgHexIn.addEventListener('input', () => {
  let v = fgHexIn.value;
  if (!v.startsWith('#')) v = '#' + v;
  if (isValidHex(v)) syncColor('fg', v);
});
bgHexIn.addEventListener('input', () => {
  let v = bgHexIn.value;
  if (!v.startsWith('#')) v = '#' + v;
  if (isValidHex(v)) syncColor('bg', v);
});

// Size
sizeSlider.addEventListener('input', () => {
  state.size = parseInt(sizeSlider.value);
  sizeVal.textContent = state.size;
  generate();
});

// EC level
ecBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    ecBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    state.ec = btn.dataset.ec;
    infoEc.textContent = state.ec;
    generate();
  });
});

// Logo toggle
logoToggle.addEventListener('change', () => {
  state.logo = logoToggle.checked;
  logoWrap.classList.toggle('open', state.logo);
  // Force H EC when logo is on
  if (state.logo && state.ec !== 'H') {
    ecBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
    const hBtn = document.querySelector('[data-ec="H"]');
    hBtn.classList.add('active'); hBtn.setAttribute('aria-pressed', 'true');
    state.ec = 'H';
  }
  generate();
});

// Logo type
logoOpts.forEach(opt => {
  opt.addEventListener('click', () => {
    logoOpts.forEach(o => { o.classList.remove('active'); o.setAttribute('aria-pressed', 'false'); });
    opt.classList.add('active'); opt.setAttribute('aria-pressed', 'true');
    state.logoType = opt.dataset.logo;
    generate();
  });
});

// Downloads
dlPng.addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'qrcode.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

dlSvg.addEventListener('click', downloadSVG);

// Keyboard navigation for EC buttons
ecBtns.forEach(btn => {
  btn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
  });
});

// ─────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────
qrInput.value = CONFIG.defaultText;
charCount.textContent = `${CONFIG.defaultText.length} / ${CONFIG.maxLength}`;
sizeVal.textContent = CONFIG.defaultSize;

// Set initial logo state
if (CONFIG.defaultLogo) {
  logoToggle.checked = true;
  logoWrap.classList.add('open');
}

setTimeout(generate, 200);
</script>
